<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión — Rubra</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            text-align: center;
            padding: 24px;
        }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; color: #d15330; }
        .icon { font-size: 64px; margin-bottom: 8px; }
        h1 { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        p { font-size: 13px; color: rgba(255,255,255,0.4); max-width: 320px; line-height: 1.7; }
        .btn {
            margin-top: 8px;
            padding: 12px 28px;
            background: #d15330;
            color: #fff;
            border: none;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: #b04225; }
    </style>
</head>
<body>
    <div class="logo">RUBRA</div>
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>No tenés conexión a internet en este momento. Revisá tu red y volvé a intentarlo.</p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">Reintentar</a>
</body>
</html>
